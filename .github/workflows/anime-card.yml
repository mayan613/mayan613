name: Generate Anime Card

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:


jobs:
  generate:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"


      - name: Generate Card
        run: |
          pip install -U Pillow
          python generate.py


      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add assets/anime-card.png
          git diff --staged --quiet || git commit -m "update anime card"
          git pull --rebase origin main
          git push origin main
